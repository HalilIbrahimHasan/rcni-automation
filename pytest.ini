[pytest]
testpaths = rcni_playwright_framework/tests
pythonpath = rcni_playwright_framework
python_files = test_*.py
python_classes = Test*
python_functions = test_*

markers =
    smoke: Quick smoke tests for critical paths
    regression: Full regression test suite
    rcni: RCNI reconciliation workflow tests
    download: GetInsured 834 download workflow tests

addopts =
    -v
    --tb=short
    --strict-markers

log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s | %(levelname)-8s | %(name)s | %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S
